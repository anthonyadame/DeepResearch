name: deepresearch-ai

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════════
  # AI STACK - LLM Inference, Vector Database, Agent Orchestration
  # ═══════════════════════════════════════════════════════════════════════════════
  # This stack contains machine learning and AI services
  # GPU-optimized for inference and vector operations
  # Can be deployed independently with dedicated GPU hardware
  # ═══════════════════════════════════════════════════════════════════════════════

  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: research-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /root/.ollama/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - deepresearch-hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Qdrant for vector semantic search and embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: research-qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      LOG_LEVEL: info
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - deepresearch-hub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Lightning Server - Agent Orchestration
  lightning-server:
    build:
      context: ..
      dockerfile: Docker/lightning-server/Dockerfile
    container_name: research-lightning-server
    ports:
      - "8090:8090"
    environment:
      # Lightning Server Configuration
      LIGHTNING_PORT: 8090
      RMPT_ENABLED: "true"
      RLCS_ENABLED: "true"
      RMPT_STRATEGY: "balanced"
      RMPT_MAX_TASKS: 10
      RMPT_TASK_TIMEOUT: 300
      RLCS_TRACKING_ENABLED: "true"
      RLCS_CONFIDENCE_THRESHOLD: 0.7
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # MongoDB Configuration (persistent storage)
      MONGO_URI: "mongodb://lightning:${MONGO_PASSWORD:-lightningpass}@mongo-primary:27017,mongo-secondary-1:27017,mongo-secondary-2:27017/?replicaSet=rs0&authSource=admin"
      MONGO_DB_NAME: "lightning"
      MONGO_REPLICA_SET: "rs0"

      # VERL Configuration (RL training)
      VERL__ENABLED: "true"
      VERL__RAY_ENABLED: "false"

      # APO Configuration (prompt optimization)
      APO__ENABLED: "true"
      APO__DEFAULT_MODEL: "Qwen/Qwen3.5-2B-Instruct"
      APO__DEFAULT_ITERATIONS: "5"
      APO__OPTIMIZATION_STRATEGY: "iterative_refinement"
      APO__EVALUATION_USE_LLM: "true"
      APO__EVALUATION_LLM_ENDPOINT: "http://host.docker.internal:8001"
      APO__EVALUATION_LLM_MODEL: "Qwen/Qwen3.5-2B"
      APO__EVALUATION_LLM_TIMEOUT: "30"
      APO__EVALUATION_FALLBACK_TO_HEURISTIC: "true"
      APO__BEAM_WIDTH: "3"
      APO__VARIATIONS_PER_PROMPT: "2"
      APO__POPULATION_SIZE: "5"
      APO__MUTATION_RATE: "0.3"
      APO__CROSSOVER_RATE: "0.7"
      APO__TOURNAMENT_SIZE: "3"

      # OpenTelemetry Configuration (distributed tracing)
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://deepresearch-otel-collector:4317"
      OTEL_SERVICE_NAME: "lightning-server"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - lightning-data:/app/data
    networks:
      - deepresearch-hub
    depends_on:
      - ollama
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  deepresearch-hub:
    external: true
    driver: bridge

volumes:
  ollama_data:
    driver: local
  qdrant_storage:
    driver: local
  lightning-data:
    driver: local
