# Prometheus Configuration for DeepResearch Workflow Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'deepresearch-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alerting rules
rule_files:
  - 'alerts.yml'

# Scrape configurations for 4-stack architecture
# ✅ WORKING TARGETS: Services with actual /metrics or working health endpoints
# ⚠️ NOTE: Many services require instrumentation libraries or metric exporters
# Services without /metrics endpoints are excluded until proper exporters are added
scrape_configs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # CORE STACK METRICS (Working)
  # ═══════════════════════════════════════════════════════════════════════════════

  # Redis Cache Metrics (Core Stack) - ✅ WORKING
  # Uses redis_exporter which exposes /metrics endpoint
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: stack
        replacement: 'core'
      - target_label: service
        replacement: 'cache'

  # InfluxDB Metrics (Core Stack) - ✅ WORKING
  # InfluxDB exposes /metrics endpoint with Prometheus format
  - job_name: 'influxdb'
    static_configs:
      - targets: ['influxdb:8086']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - target_label: stack
        replacement: 'core'
      - target_label: service
        replacement: 'timeseries'
      - target_label: instance
        replacement: 'influxdb:8086'

  # ═══════════════════════════════════════════════════════════════════════════════
  # AI STACK METRICS (Working)
  # ═══════════════════════════════════════════════════════════════════════════════

  # Qdrant Vector Database Metrics (AI Stack) - ✅ WORKING
  # Qdrant exposes /metrics endpoint
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - target_label: stack
        replacement: 'ai'
      - target_label: service
        replacement: 'vectordb'
      - target_label: instance
        replacement: 'qdrant:6333'

  # ═══════════════════════════════════════════════════════════════════════════════
  # WEBSEARCH STACK METRICS (Partial)
  # ═══════════════════════════════════════════════════════════════════════════════
  # Note: Crawl4AI health endpoint returns JSON, not Prometheus metrics format

  # ═══════════════════════════════════════════════════════════════════════════════
  # MONITORING STACK (Self-monitoring)
  # ═══════════════════════════════════════════════════════════════════════════════

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

# Storage configuration is handled via command-line flags in docker-compose
# These settings are applied via the Prometheus container command parameters
# Example: --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=30d
