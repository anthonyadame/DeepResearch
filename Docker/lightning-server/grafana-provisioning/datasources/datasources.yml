# Grafana Datasources Configuration
# Auto-provisioned on Grafana startup

apiVersion: 1

datasources:
  # Prometheus - Metrics datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    version: 1

  # Lightning Store OTLP - Traces datasource (via Tempo-compatible endpoint)
  - name: Lightning Traces
    type: tempo
    access: proxy
    url: http://lightning-server:9090
    isDefault: false
    editable: true
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: Loki
        tags: ['trace_id', 'span_id']
    version: 1
